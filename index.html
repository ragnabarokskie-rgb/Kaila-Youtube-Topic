const DATA_UPDATED='April 23, 2026';
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='flex';});
document.getElementById('installBtn').addEventListener('click',()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;document.getElementById('installBanner').style.display='none';}});
document.getElementById('lastUpdated').textContent='Data updated: '+DATA_UPDATED;
function init(){
  const set=new Set();
  VIDEOS.forEach(r=>{const d=new Date(r.p);if(!isNaN(d))set.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));});
  const sel=document.getElementById('monthPicker');
  Array.from(set).sort().reverse().forEach(m=>{
    const[y,mo]=m.split('-').map(Number);
    const lastYearMonth=`${y-1}-${String(mo).padStart(2,'0')}`;
    if(!set.has(lastYearMonth))return;
    const lbl=new Date(y,mo-1,1).toLocaleString('en-US',{month:'long',year:'numeric'});
    sel.innerHTML+=`<option value="${y}-${String(mo).padStart(2,'0')}">${lbl}</option>`;
  });
}
function checkReady(){document.getElementById('analyzeBtn').disabled=!document.getElementById('monthPicker').value;}
function getTop10(monthStr){
  const[y,m]=monthStr.split('-').map(Number);
  const target=`${y-1}-${String(m).padStart(2,'0')}`;
  return VIDEOS.filter(r=>{const d=new Date(r.p);if(isNaN(d))return false;return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')===target;}).sort((a,b)=>b.v-a.v).slice(0,10);
}
function getRecent(){
  const now=new Date();const cut=new Date(now.getFullYear(),now.getMonth()-2,1);
  return VIDEOS.filter(r=>{const d=new Date(r.p);return!isNaN(d)&&d>=cut;}).sort((a,b)=>new Date(b.p)-new Date(a.p)).slice(0,6);
}
async function analyze(){
  const monthStr=document.getElementById('monthPicker').value;
  const[y,m]=monthStr.split('-').map(Number);
  const monthName=new Date(y,m-1,1).toLocaleString('en-US',{month:'long'});
  const lastYear=y-1;
  const top10=getTop10(monthStr);
  const recent=getRecent();
  document.getElementById('results').style.display='none';
  document.getElementById('errorMsg').textContent='';
  if(!top10.length){document.getElementById('errorMsg').textContent=`No videos found for ${monthName} ${lastYear}. Try another month.`;return;}
  document.getElementById('loading').style.display='flex';
  document.getElementById('analyzeBtn').disabled=true;
  const topTitles=top10.slice(0,5).map((v,i)=>`${i+1}. ${v.t} (${v.v.toLocaleString()} views)`).join('; ');
  const recentTitles=recent.map(v=>v.t).join('; ')||'none';
  const prompt=`NC/Charlotte real estate YouTube channel. Top videos from ${monthName} ${lastYear}: ${topTitles}. Recent uploads to avoid: ${recentTitles}. Suggest 6 fresh video topics for ${monthName} ${y}. Return JSON array with fields: title, why (1 sentence), hook (1 sentence). JSON only.`;
  try{
    const res=await fetch('/.netlify/functions/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Server error');
    let raw=data.text.replace(/```json|```/g,'').trim();
    const topics=JSON.parse(raw);
    document.getElementById('loading').style.display='none';
    renderResults(top10,topics,recent,monthName,lastYear);
  }catch(err){
    document.getElementById('loading').style.display='none';
    document.getElementById('errorMsg').textContent='Error: '+err.message;
    document.getElementById('analyzeBtn').disabled=false;
  }
}
function renderResults(top10,topics,recent,monthName,lastYear){
  document.getElementById('topLabel').textContent=`Top ${top10.length} — ${monthName} ${lastYear}`;
  document.getElementById('topVideosList').innerHTML=top10.map((v,i)=>`<div class="top-video"><span class="rank">${i+1}</span><span class="vtitle">${v.t}</span><span class="vviews">${v.v.toLocaleString()}</span></div>`).join('');
  document.getElementById('topicsGrid').innerHTML=topics.map((t,i)=>`<div class="topic-card"><div class="topic-num">Idea ${i+1}</div><div class="topic-title">${t.title}</div><div class="topic-why">${t.why}</div><div class="topic-hook">${t.hook}</div><button class="copy-btn" onclick="copyT(this,'${encodeURIComponent(t.title)}')">Copy title</button></div>`).join('');
  document.getElementById('historyList').innerHTML=!recent.length?'<div style="font-size:12px;color:var(--muted)">No recent videos found.</div>':recent.map(v=>`<div class="history-item"><div class="hdate">${new Date(v.p).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div><div><div class="htitle">${v.t}</div><div class="hviews">${v.v.toLocaleString()} views</div></div></div>`).join('');
  document.getElementById('results').style.display='block';
  document.getElementById('analyzeBtn').disabled=false;
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}
function copyT(btn,encoded){
  const title=decodeURIComponent(encoded);
  navigator.clipboard.writeText(title).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy title',1500);}).catch(()=>{const ta=document.createElement('textarea');ta.value=title;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy title',1500);});
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
init();
</script>
